name: todo
description: "Flutter Firebase ToDo and project management app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  firebase_auth: ^6.4.0
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  shared_preferences: ^2.5.4
  syncfusion_flutter_charts: ^33.1.49
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  connectivity_plus: ^7.1.1
  flutter_native_splash: ^2.4.7
  intl: ^0.20.2
  flutter_colorpicker: ^1.1.0
  flutter_launcher_icons: ^0.14.4
  cloud_functions: ^6.3.1
  http: ^1.6.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^21.0.0
  android_intent_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  font_awesome_flutter: ^10.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:
  background_image: "assets/images/hinh_nen_1.jpg"
  image: "assets/images/logo.png"
    
  android_12:
    color: "FFFFFF" # "#001BCD"
    image: "assets/images/logo.png"

flutter_launcher_icons:
  android: true
  # ios: true
  image_path: "assets/images/logo.png" 
  adaptive_icon_background: "#ffffff" 
  # adaptive_icon_foreground: "assets/images/logo_foreground.png" # (Dành cho Android)
